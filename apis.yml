aid: supernal-aero
name: Supernal
description: >-
  Supernal is the Advanced Air Mobility (AAM) company of Hyundai Motor Group,
  headquartered in Washington, D.C. with engineering operations in California.
  Supernal is developing the SA-2, an all-electric vertical take-off and
  landing (eVTOL) aircraft unveiled at CES 2024, designed for short urban and
  regional trips with a pilot and four passengers, targeting commercial entry
  later this decade pending FAA Type Certification. Supernal leverages Hyundai
  Motor Group capabilities in design, manufacturing, batteries, motors, and
  software, and envisions an integrated AAM ecosystem of vertiports, sky
  corridors, and last-mile connectivity through robotaxis and rideshare.
  Supernal is hardware- and ecosystem-focused with no public consumer or
  developer APIs at this stage.
